services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://mynote:mynote@db:5432/mynote
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=mynote
      - POSTGRES_PASSWORD=mynote
      - POSTGRES_DB=mynote
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mynote"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
